<header class="masthead" role="banner">
  <div class="page-wrap">
    <a href="{{ '/' | relative_url }}" class="masthead__brand">
      <img src="/assets/img/logo.png" alt="AegisPub" class="masthead__logo">
      <div class="masthead__wordmark">AegisPub</div>
    </a>
    <div class="masthead__tagline">{{ site.tagline }}</div>
    <div class="masthead__dateline">{{ site.time | date: "%A, %B %-d, %Y" }}</div>
  </div>
</header>
