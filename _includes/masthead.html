<header class="masthead" role="banner">
  <div>
    <a href="{{ '/' | relative_url }}" style="text-decoration:none;">
      <img src="/assets/img/logo.png" alt="AegisPub" style="height:64px; width:auto; display:inline-block; vertical-align:left; margin-bottom:8px;">
      <div class="masthead__wordmark">AegisPub</div>
    </a>
    <div class="masthead__tagline">{{ site.tagline }}</div>
    <div class="masthead__dateline">{{ site.time | date: "%A, %B %-d, %Y" }}</div>
  </div>
</header>
