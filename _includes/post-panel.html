<div class="post-panel" id="post-panel" role="region" aria-label="Post content" aria-live="polite">
  <div class="post-panel__inner" id="post-panel-content">
    <!-- Content injected by panel.js -->
  </div>
  <div class="post-panel__nav" id="post-panel-nav">
    <button class="post-panel__nav-btn" id="panel-prev" aria-label="Previous post" disabled>← Prev</button>
    <span class="post-panel__permalink" id="panel-permalink"></span>
    <button class="post-panel__nav-btn" id="panel-next" aria-label="Next post" disabled>Next →</button>
  </div>
</div>
