<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="copyright" content="AegisPub. All rights reserved.">
  <meta name="author" content="AegisPub">
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">

  <!-- SEO -->
  {% seo %}

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/type.css' | relative_url }}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS Feed" href="{{ '/feed.xml' | relative_url }}">

  <!-- Post ID array for panel.js prev/next (injected per-layout when needed) -->
  {% if page.post_ids %}
  <script>
    window.AEGIS_POST_IDS = {{ page.post_ids | jsonify }};
  </script>
  {% endif %}
</head>
<body>

  {% include masthead.html %}
  {% include nav.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include colophon.html %}
  {% include footer.html %}

  <!-- panel.js — deferred, does not block render -->
  <script src="{{ '/assets/js/panel.js' | relative_url }}" defer></script>

  <!-- Visitor counter — track this visit, then display total in footer -->
  <script>
    (function () {
      var WORKER = 'https://counter.contactaegispub.workers.dev';

      // Track visit (skip localhost)
      if (window.location.hostname !== 'localhost') {
        fetch(WORKER + '/collect', { method: 'POST', keepalive: true })
          .catch(function () {});
      }

      // Display count in footer
      fetch(WORKER + '/count')
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var el = document.getElementById('visitor-count');
          if (el && typeof d.total === 'number') {
            el.textContent = d.total.toLocaleString();
          }
        })
        .catch(function () {}); // shows — if Worker unreachable
    }());

      // Live dateline — always shows visitor's current date
      (function () {
        var el = document.getElementById('masthead-date');
        if (!el) return;
        var now = new Date();
        var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        var months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
        el.textContent = days[now.getDay()] + ', ' + months[now.getMonth()] +
                         ' ' + now.getDate() + ', ' + now.getFullYear();
      }());    
  </script>

</body>
</html>
