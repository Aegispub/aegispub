<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="copyright" content="AegisPub. All rights reserved.">
  <meta name="author" content="AegisPub">
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon.png' | relative_url }}">

  <!-- SEO -->
  {% seo %}

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/type.css' | relative_url }}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS Feed" href="{{ '/feed.xml' | relative_url }}">

  <!-- Post ID array for panel.js prev/next (injected per-layout when needed) -->
  {% if page.post_ids %}
  <script>
    window.AEGIS_POST_IDS = {{ page.post_ids | jsonify }};
  </script>
  {% endif %}
</head>
<body>

  {% include masthead.html %}
  {% include nav.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include colophon.html %}
  {% include footer.html %}

  <!-- panel.js — deferred, does not block render -->
  <script src="{{ '/assets/js/panel.js' | relative_url }}" defer></script>

  <!-- Live dateline — always shows visitor's current date -->
  <script>
    (function () {
      var el = document.getElementById('masthead-date');
      if (!el) return;
      var now = new Date();
      var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
      el.textContent = days[now.getDay()] + ', ' + months[now.getMonth()] +
                       ' ' + now.getDate() + ', ' + now.getFullYear();
    }());
  </script>

  <!-- Visitor counter + live tracker -->
  <script>
    (function () {
      var WORKER = 'https://counter.contactaegispub.workers.dev';

      // Session token — new tab = new live session, refresh = same session
      var token = sessionStorage.getItem('aegis_token');
      if (!token) {
        token = Math.random().toString(36).slice(2) + Date.now().toString(36);
        sessionStorage.setItem('aegis_token', token);
      }

      // Track this visit
      if (window.location.hostname !== 'localhost') {
        fetch(WORKER + '/collect', {
          method: 'POST',
          keepalive: true,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token })
        }).catch(function () {});
      }

      // Helper — country code to emoji flag
      function toFlag(code) {
        if (!code || code.length !== 2) return '';
        return code.toUpperCase().split('').map(function (c) {
          return String.fromCodePoint(0x1F1E6 - 65 + c.charCodeAt(0));
        }).join('');
      }

      // Fetch and display counts + flags
      fetch(WORKER + '/count')
        .then(function (r) { return r.json(); })
        .then(function (d) {

          // Total visitor count
          var visitEl = document.getElementById('visitor-count');
          if (visitEl && typeof d.total === 'number') {
            visitEl.textContent = d.total.toLocaleString();
          }

          // Live count
          var liveEl = document.getElementById('live-count');
          if (liveEl && typeof d.live === 'number') {
            liveEl.textContent = d.live;
          }

          // Current visitor's flag below live count
          var liveFlagEl = document.getElementById('live-flags');
          if (liveFlagEl && d.current) {
            liveFlagEl.textContent = toFlag(d.current);
            liveFlagEl.title = d.current;
          }

          // All accumulated country flags below visitor count
          var countryFlagEl = document.getElementById('country-flags');
          if (countryFlagEl && Array.isArray(d.countries) && d.countries.length) {
            countryFlagEl.textContent = d.countries.map(toFlag).join('');
            countryFlagEl.title = d.countries.join(', ');
          }

        })
        .catch(function () {});
    }());
  </script>

</body>
</html>
