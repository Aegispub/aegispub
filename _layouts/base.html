<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <!-- SEO -->
  {% seo %}

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/type.css' | relative_url }}">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS Feed" href="{{ '/feed.xml' | relative_url }}">

  <!-- Post ID array for panel.js prev/next (injected per-layout when needed) -->
  {% if page.post_ids %}
  <script>
    window.AEGIS_POST_IDS = {{ page.post_ids | jsonify }};
  </script>
  {% endif %}
</head>
<body>

  {% include masthead.html %}
  {% include nav.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include colophon.html %}
  {% include footer.html %}

  <!-- panel.js — deferred, does not block render -->
  <script src="{{ '/assets/js/panel.js' | relative_url }}" defer></script>

</body>
</html>
